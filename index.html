<style>
  :root {
    --bg: #f4f4f4;
    --black: #000;
    --accent: #ff3e00;
    --font-header: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; caret-color: var(--accent); }

  ::selection { background-color: var(--black);
  color: var(--bg);
  } 

  body { 
    background: var(--bg);
    color: var(--black);
    font-family: var(--font-header);
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
  }

  .magazine-container {
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }

  section {
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    padding: 40px;
    display: grid;
    grid-template: repeat(12, 1fr) / repeat(12, 1fr);
    border-bottom: 2px solid var(--black);
    position: relative;
    overflow: hidden;
    contain: layout style;
  }

  .big-title {
    grid-area: 2 / 1 / 6 / 13;
    font-size: clamp(5rem, 15vw, 15rem);
    line-height: .8;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -.07em;
    z-index: 2;
  }

  .sub-text {
    grid-area: 8 / 7 / 11 / 13;
    font-size: clamp(1rem, 1.4rem, 2rem);
    line-height: 1.1;
    text-align: justify;
    z-index: 2;
  }

  .meta-data {
    grid-area: 10 / 1 / 12 / 5;
    font-family: var(--font-mono);
    font-size: .8rem;
    border-top: 2px solid var(--black);
    padding-top: 15px;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .page-number {
    position: absolute;
    bottom: 20px;
    right: 40px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.2rem;
  }

  .spam-bg {
    position: absolute;
    inset: 50% auto auto 50%;
    transform: translate(-50%, -50%) rotate(-5deg);
    font-size: 30vw;
    font-weight: 900;
    opacity: .03;
    white-space: nowrap;
    pointer-events: none;
    z-index: 1;
    user-select: none;
  }

  #hold-indicator {
    position: fixed;
    bottom: 20px;
    left: 40px;
    font-family: var(--font-mono);
    font-size: .7rem;
    text-transform: uppercase;
    z-index: 10;
    color: #121212;
  }
  
  a {
    -webkit-tap-highlight-color: transparent;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  a:hover, a:active {
    opacity: 0.5;
    text-decoration: underline;
  }

  a::selection {
    background-color: var(--accent);
  }

</style>
</head>
<body>

<div id="hold-indicator" aria-hidden="true">[ SCROLL / SWIPE ]</div>

<main class="magazine-container">
  <section id="intro">
    <h1 class="big-title">ABOUT</h1>
    <div class="spam-bg" role="img" aria-label="weirdo">WEIRDO</div>
    <p class="sub-text">ネート who loves the vibes of coding and attention to detail of design.</p>
    <div class="meta-data">
        GO with <a href="https://weirdo-kido.github.io/weirgo/" target="_blank" rel="noopener">WEIRGO</a>
    </div>
    <div class="page-number" aria-label="Page 1">01</div>
  </section>

  <section id="projects">
    <h2 class="big-title" style="color: var(--accent);">ME</h2>
    <div class="spam-bg role="img" aria-label="kido">KIDO</div>
    <p class="sub-text" style="grid-area: 7 / 2 / 10 / 8;">
       Bridging the gap between web aesthetics and weaboo culture.<br>An AI in 2026 is already laughing at my code patterns. Are you?
    </p>
    <div class="meta-data" style="grid-area: 10 / 9 / 12 / 13;">
        KIDO <a href="https://ko-fi.com/weirdo_kido/" target="_blank" rel="noopener noreferrer sponsored">FUEL</a>
    </div>
    <div class="page-number" aria-label="Page 2">02</div>
  </section>
</main>

</body>
</html>
